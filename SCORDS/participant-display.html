<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผู้เข้าร่วมกิจกรรม - Participant Display (SCORDS Backend)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Note: Tailwind CSS CDN is used for standalone HTML file. For production, consider using Tailwind CLI or PostCSS plugin. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            font-family: 'Prompt', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -50px); }
        }

        /* Activity Selector */
        .activity-selector {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .activity-selector h2 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .activity-list {
            margin: 20px 0;
        }

        .activity-item {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .activity-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .activity-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .activity-item h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .activity-item p {
            font-size: 14px;
            opacity: 0.8;
            margin: 2px 0;
        }

        .activity-item .meta {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 12px;
        }

        .activity-item .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Floating profile pictures with 3D perspective */
        .profile-container {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
            top: 0;
            left: 0;
            pointer-events: none; /* Allow clicking through empty space */
            perspective: 1000px; /* Add 3D perspective */
            transform-style: preserve-3d;
        }

        .floating-profile {
            position: absolute;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            overflow: hidden;
            background: white;
            pointer-events: auto;
            opacity: 1 !important; /* Always visible, no flickering */
            will-change: transform; /* Smooth animation */
            transform-style: preserve-3d; /* Enable 3D transforms */
        }

        .floating-profile:hover {
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 215, 0, 0.9);
            z-index: 100;
        }

        .floating-profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bounce-off-edges animations + pulse effect */

        /* Horizontal bounce - left to right and back */
        @keyframes bounce-horizontal {
            0%, 100% { transform: translateX(-40vw); }
            50% { transform: translateX(40vw); }
        }

        @keyframes bounce-horizontal-reverse {
            0%, 100% { transform: translateX(40vw); }
            50% { transform: translateX(-40vw); }
        }

        /* Vertical bounce - top to bottom and back */
        @keyframes bounce-vertical {
            0%, 100% { transform: translateY(-40vh); }
            50% { transform: translateY(40vh); }
        }

        @keyframes bounce-vertical-reverse {
            0%, 100% { transform: translateY(40vh); }
            50% { transform: translateY(-40vh); }
        }

        /* Diagonal bounces - corner to corner */
        @keyframes bounce-diagonal-1 {
            0%, 100% { transform: translate(-38vw, -35vh); }
            50% { transform: translate(38vw, 35vh); }
        }

        @keyframes bounce-diagonal-2 {
            0%, 100% { transform: translate(38vw, -35vh); }
            50% { transform: translate(-38vw, 35vh); }
        }

        @keyframes bounce-diagonal-3 {
            0%, 100% { transform: translate(-38vw, 35vh); }
            50% { transform: translate(38vw, -35vh); }
        }

        @keyframes bounce-diagonal-4 {
            0%, 100% { transform: translate(38vw, 35vh); }
            50% { transform: translate(-38vw, -35vh); }
        }

        /* Multi-bounce patterns - hit multiple edges */
        @keyframes bounce-zigzag {
            0% { transform: translate(-35vw, -30vh); }
            25% { transform: translate(35vw, -30vh); }
            50% { transform: translate(35vw, 30vh); }
            75% { transform: translate(-35vw, 30vh); }
            100% { transform: translate(-35vw, -30vh); }
        }

        @keyframes bounce-zigzag-reverse {
            0% { transform: translate(35vw, 30vh); }
            25% { transform: translate(-35vw, 30vh); }
            50% { transform: translate(-35vw, -30vh); }
            75% { transform: translate(35vw, -30vh); }
            100% { transform: translate(35vw, 30vh); }
        }

        @keyframes bounce-triangle {
            0% { transform: translate(0, -35vh); }
            33% { transform: translate(35vw, 30vh); }
            66% { transform: translate(-35vw, 30vh); }
            100% { transform: translate(0, -35vh); }
        }

        @keyframes bounce-triangle-reverse {
            0% { transform: translate(0, 35vh); }
            33% { transform: translate(-35vw, -30vh); }
            66% { transform: translate(35vw, -30vh); }
            100% { transform: translate(0, 35vh); }
        }

        /* Random corner bouncing */
        @keyframes bounce-corners {
            0% { transform: translate(-35vw, -30vh); }
            20% { transform: translate(35vw, -30vh); }
            40% { transform: translate(35vw, 30vh); }
            60% { transform: translate(-35vw, 30vh); }
            80% { transform: translate(0, 0); }
            100% { transform: translate(-35vw, -30vh); }
        }

        @keyframes bounce-corners-alt {
            0% { transform: translate(35vw, 30vh); }
            20% { transform: translate(-35vw, 30vh); }
            40% { transform: translate(-35vw, -30vh); }
            60% { transform: translate(35vw, -30vh); }
            80% { transform: translate(0, 0); }
            100% { transform: translate(35vw, 30vh); }
        }

        /* Pulse/breathe effect - scale up and down */
        @keyframes pulse-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes pulse-breathe-alt {
            0%, 100% { transform: scale(1); }
            33% { transform: scale(1.1); }
            66% { transform: scale(0.95); }
        }

        /* Size variations - animations assigned randomly via JS */
        .size-small {
            width: 60px;
            height: 60px;
        }

        .size-medium {
            width: 90px;
            height: 90px;
        }

        .size-large {
            width: 120px;
            height: 120px;
        }

        .size-xlarge {
            width: 150px;
            height: 150px;
        }

        /* Pulse animation - applied via JS after entrance */
        .floating-profile {
            /* Animation will be set by JavaScript */
        }

        /* Smooth water-like entrance animation - no rotation */
        @keyframes floatUp {
            0% {
                transform: translateY(100px) scale(0.3);
                opacity: 0;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .profile-enter {
            animation: floatUp 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
        }

        /* After entrance animation, let floating take over */
        .profile-enter.floating {
            animation: none !important;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .header-left {
            flex: 1;
        }

        .header-center {
            flex: 2;
            text-align: center;
        }

        .header-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 1rem;
        }

        .activity-info {
            color: white;
        }

        .activity-info h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .activity-details {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .activity-details span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .realtime-clock {
            text-align: right;
            color: white;
        }

        .realtime-clock .time {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .realtime-clock .date {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .header-back-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .header-back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Stats counter */
        .stats-counter {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 50;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem 2.5rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* Control panel */
        .control-panel {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            z-index: 50;
            display: flex;
            gap: 0.5rem;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .control-btn.secondary {
            background: rgba(255, 87, 34, 0.8);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tooltip */
        .profile-tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            white-space: nowrap;
            z-index: 101;
        }

        .floating-profile:hover .profile-tooltip {
            opacity: 1;
        }

        /* Confetti effect */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f0f;
            position: absolute;
            animation: confetti-fall 3s linear forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Pulse effect for new arrivals */
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .new-arrival::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 3px solid #FFD700;
            animation: pulse-ring 1.5s ease-out infinite;
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 101;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 0.5rem;
            }

            .header-left, .header-center, .header-right {
                width: 100%;
                text-align: center;
            }

            .activity-info h1 {
                font-size: 1.1rem;
            }

            .activity-details {
                flex-wrap: wrap;
                justify-content: center;
                font-size: 0.75rem;
            }

            .realtime-clock .time {
                font-size: 1.2rem;
            }

            .realtime-clock .date {
                font-size: 0.7rem;
            }

            .header-back-btn {
                font-size: 12px;
                padding: 0.4rem 0.8rem;
            }

            .stats-counter {
                bottom: 1rem;
                right: 1rem;
                padding: 1rem 1.5rem;
                font-size: 0.875rem;
            }

            .control-panel {
                bottom: 1rem;
                left: 1rem;
            }

            .size-small { width: 45px; height: 45px; }
            .size-medium { width: 65px; height: 65px; }
            .size-large { width: 85px; height: 85px; }
            .size-xlarge { width: 100px; height: 100px; }
        }

        /* Hide selector when showing display */
        .hide {
            display: none !important;
        }

        .show {
            display: block !important;
        }

        /* Refresh interval selector */
        .refresh-selector {
            position: fixed;
            bottom: 6rem;
            left: 2rem;
            z-index: 50;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            min-width: 200px;
        }

        .refresh-selector h4 {
            color: #667eea;
            margin-bottom: 0.75rem;
            font-size: 14px;
            font-weight: 600;
        }

        .refresh-selector select {
            width: 100%;
            padding: 0.5rem;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-selector select:hover {
            border-color: #667eea;
        }

        .refresh-selector select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Speed selector */
        .speed-selector {
            position: fixed;
            bottom: 10rem;
            left: 2rem;
            z-index: 50;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            min-width: 200px;
        }

        .speed-selector h4 {
            color: #667eea;
            margin-bottom: 0.75rem;
            font-size: 14px;
            font-weight: 600;
        }

        .speed-selector input[type="range"] {
            width: 100%;
            margin: 0.5rem 0;
            cursor: pointer;
        }

        .speed-value {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Background Animation -->
    <div class="bg-animation"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <!-- Left: Activity Info -->
            <div class="header-left">
                <div class="activity-info" id="activityInfoSection" style="display: none;">
                    <h1 id="headerActivityName">กิจกรรม...</h1>
                    <div class="activity-details">
                        <span>📅 <span id="headerActivityDate">-</span></span>
                        <span>⏰ <span id="headerActivityTime">-</span></span>
                        <span>📍 <span id="headerActivityLocation">-</span></span>
                    </div>
                </div>
            </div>

            <!-- Center: Real-time Clock -->
            <div class="header-center">
                <div class="realtime-clock">
                    <div class="time" id="realtimeTime">00:00:00</div>
                    <div class="date" id="realtimeDate">-</div>
                </div>
            </div>

            <!-- Right: Back Button -->
            <div class="header-right">
                <button id="headerBackBtn" class="header-back-btn hide" onclick="showActivitySelector()">
                    ← กลับเลือกกิจกรรม
                </button>
            </div>
        </div>
    </header>

    <!-- Activity Selector -->
    <div id="activitySelector" class="activity-selector">
        <h2>📋 เลือกกิจกรรม</h2>
        <div id="activityList" class="activity-list">
            <div style="text-align: center; color: #666; padding: 40px;">
                <div class="loading-spinner" style="border-color: #667eea; border-top-color: transparent;"></div>
                <p style="margin-top: 15px;">กำลังโหลดกิจกรรม...</p>
            </div>
        </div>
    </div>

    <!-- Profile Container -->
    <div id="profileContainer" class="profile-container hide">
        <!-- Profiles will be dynamically added here -->
    </div>

    <!-- Stats Counter -->
    <div class="stats-counter">
        <div class="text-center">
            <p class="text-white/80 text-sm mb-1">ผู้เข้าร่วมทั้งหมด</p>
            <p class="text-5xl font-bold text-white" id="participantCount">0</p>
            <p class="text-white/60 text-xs mt-2">คน</p>
        </div>
    </div>

    <!-- Control Panel -->
    <div class="control-panel">
        <button class="control-btn secondary" onclick="showActivitySelector()">
            📋 เลือกกิจกรรม
        </button>
        <button class="control-btn" onclick="refreshData()">
            🔄 รีเฟรช
        </button>
        <button class="control-btn" onclick="toggleAutoRefresh()">
            ⏱️ อัตโนมัติ: <span id="autoRefreshStatus">OFF</span>
        </button>
        <button class="control-btn" onclick="showRefreshSelector()">
            ⏰ ตั้งเวลา
        </button>
        <button class="control-btn" onclick="showSpeedSelector()">
            🚀 ความเร็ว
        </button>
        <button class="control-btn" onclick="exportData()">
            📊 ส่งออก
        </button>
    </div>

    <!-- Refresh Interval Selector -->
    <div id="refreshSelector" class="refresh-selector hide">
        <h4>⏰ เลือกระยะเวลาอัตโนมัติ</h4>
        <select id="refreshInterval" onchange="updateRefreshInterval(this.value)">
            <option value="30000">30 วินาที</option>
            <option value="60000">1 นาที</option>
            <option value="120000">2 นาที</option>
            <option value="300000" selected>5 นาที</option>
            <option value="600000">10 นาที</option>
            <option value="900000">15 นาที</option>
        </select>
    </div>

    <!-- Speed Selector -->
    <div id="speedSelector" class="speed-selector hide">
        <h4>🚀 ความเร็วการลอย</h4>
        <input type="range" id="speedSlider" min="1" max="10" value="5" oninput="updateSpeed(this.value)">
        <div class="speed-value">
            ความเร็ว: <span id="speedValue">5</span>/10
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // CONFIGURATION - แก้ไข URL ตรงนี้
        // ═══════════════════════════════════════════════════════════════

        // URL ของ Google Apps Script Web App (Deploy แล้วแทนที่ด้วย)
        // ⚠️ ถ้ายังไม่ได้ deploy ให้ใช้ Demo mode อัตโนมัติ:
        // - เปิดไฟล์พร้อม ?activityId=demo
        // - หรือปล่อยทิ้งไว้ว่าง่ายเป็น 'YOUR_DEPLOYED_WEB_APP_URL_HERE'
        const SCORDS_API_URL = 'https://script.google.com/macros/s/AKfycbyKIjyR5SmweHqZzVANUJfmX_ssF03YatbQuQBkZ1ijOtA0KGYD3M1yxVSivnCn3X5zIA/exec';

                vx: (Math.random() - 0.5) * 1.2, // Random velocity X (-0.6 to 0.6)
                vy: (Math.random() - 0.5) * 1.0, // Random velocity Y (-0.5 to 0.5)
                vz: (Math.random() - 0.5) * 0.8, // Random velocity Z (-0.4 to 0.4)
                speed: 0.05 + Math.random() * 0.1, // Slower random speed (0.05 to 0.15)
                minZ: -200, // Farthest depth
                maxZ: 200, // Closest depth
                element: profile

            // Debug log
            console.log(`✨ Created profile: ${participant.displayName} (${sizeClass}) at ${posX.toFixed(1)}%, ${posY.toFixed(1)}%`);

        // Start pinball-style movement for all profiles
        let animationFrameId = null;
        function startPinballMovement() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            function animate() {
                const container = document.getElementById('profileContainer');
                if (!container) return;

                const containerRect = container.getBoundingClientRect();
                const maxX = 100; // Percentage
                const maxY = 100; // Percentage

                Object.keys(PROFILE_MOVEMENT).forEach(userId => {
                    const data = PROFILE_MOVEMENT[userId];
                    if (!data.element || !data.element.offsetParent) return; // Skip if element not in DOM

                    // Update position in 3D space with speed multiplier
                    data.x += data.vx * data.speed * SPEED_MULTIPLIER;
                    data.y += data.vy * data.speed * SPEED_MULTIPLIER;
                    data.z += data.vz * data.speed * SPEED_MULTIPLIER;

                    // Get element size for collision detection
                    const rect = data.element.getBoundingClientRect();
                    const elemWidth = rect.width / containerRect.width * 100;
                    const elemHeight = rect.height / containerRect.height * 100;

                    // Bounce off edges (X, Y, Z)
                    let bounced = false;

                    // Right edge
                    if (data.x + elemWidth / 2 > maxX - 5) {
                        data.x = maxX - 5 - elemWidth / 2;
                        data.vx = -Math.abs(data.vx) + (Math.random() - 0.5) * 0.3; // Bounce left with more random
                        bounced = true;
                    }
                    // Left edge
                    else if (data.x - elemWidth / 2 < 5) {
                        data.x = 5 + elemWidth / 2;
                        data.vx = Math.abs(data.vx) + (Math.random() - 0.5) * 0.3; // Bounce right with more random
                        bounced = true;
                    }

                    // Bottom edge
                    if (data.y + elemHeight / 2 > maxY - 10) {
                        data.y = maxY - 10 - elemHeight / 2;
                        data.vy = -Math.abs(data.vy) + (Math.random() - 0.5) * 0.3; // Bounce up with more random
                        bounced = true;
                    }
                    // Top edge
                    else if (data.y - elemHeight / 2 < 5) {
                        data.y = 5 + elemHeight / 2;
                        data.vy = Math.abs(data.vy) + (Math.random() - 0.5) * 0.3; // Bounce down with more random
                        bounced = true;
                    }

                    // Z-depth bounds (far and near)
                    if (data.z < data.minZ) {
                        data.z = data.minZ;
                        data.vz = Math.abs(data.vz) + (Math.random() - 0.5) * 0.2; // Bounce forward
                        bounced = true;
                    } else if (data.z > data.maxZ) {
                        data.z = data.maxZ;
                        data.vz = -Math.abs(data.vz) + (Math.random() - 0.5) * 0.2; // Bounce backward
                        bounced = true;
                    }

                    // Randomize direction more when bouncing
                    if (bounced) {
                        data.vx += (Math.random() - 0.5) * 0.2;
                        data.vy += (Math.random() - 0.5) * 0.2;
                        data.vz += (Math.random() - 0.5) * 0.15;

                        // Normalize velocity to maintain consistent speed
                        const currentSpeed = Math.sqrt(data.vx * data.vx + data.vy * data.vy + data.vz * data.vz);
                        if (currentSpeed > 0) {
                            data.vx = (data.vx / currentSpeed) * 0.7;
                            data.vy = (data.vy / currentSpeed) * 0.6;
                            data.vz = (data.vz / currentSpeed) * 0.4;
                        }
                    }

                    // Keep velocity within bounds
                    data.vx = Math.max(-0.8, Math.min(0.8, data.vx));
                    data.vy = Math.max(-0.7, Math.min(0.7, data.vy));
                    data.vz = Math.max(-0.5, Math.min(0.5, data.vz));

                    // Update position (X, Y)
                    data.element.style.left = `${data.x}%`;
                    data.element.style.top = `${data.y}%`;

                    // Calculate scale based on depth (Z)
                    // Far (negative Z) = smaller, Close (positive Z) = larger
                    const depthScale = 1 + (data.z / 500); // Range: 0.6 to 1.4
                    const scale = Math.max(0.5, Math.min(1.5, depthScale));

                    // Apply 3D transform with depth
                    data.element.style.transform = `translateZ(${data.z}px) scale(${scale})`;
                });

                animationFrameId = requestAnimationFrame(animate);
            }

            animate();
        }

        // Get random size class
        function getSizeClass() {
            const sizes = ['size-small', 'size-medium', 'size-large', 'size-xlarge'];
            const weights = [0.4, 0.3, 0.2, 0.1]; // More small than large
            const random = Math.random();
            let sum = 0;

            for (let i = 0; i < weights.length; i++) {
                sum += weights[i];
                if (random <= sum) return sizes[i];
            }

            return 'size-medium';
        }

        // Animate counter
        function animateCounter(element, target) {
            const current = parseInt(element.textContent) || 0;
            const increment = (target - current) / 20;
            let value = current;

            const timer = setInterval(() => {
                value += increment;
                if ((increment > 0 && value >= target) || (increment < 0 && value <= target)) {
                    element.textContent = target;
                    clearInterval(timer);
                } else {
                    element.textContent = Math.round(value);
                }
            }, 50);
        }

        // Trigger confetti effect
        function triggerConfetti() {
            const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4'];

            for (let i = 0; i < 15; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(confetti);

                // Remove after animation
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Setup real-time updates
        function setupRealtimeUpdates() {
            // Polling for updates (interval configurable by user)
            setInterval(async () => {
                if (IS_AUTO_REFRESH && CURRENT_ACTIVITY_ID) {
                    await loadParticipants();
                }
            }, REFRESH_INTERVAL_MS);
        }

        // Show refresh interval selector
        function showRefreshSelector() {
            const selector = document.getElementById('refreshSelector');
            selector.classList.toggle('hide');
        }

        // Update refresh interval
        function updateRefreshInterval(intervalMs) {
            REFRESH_INTERVAL_MS = parseInt(intervalMs);

            // Update interval display
            const minutes = Math.floor(REFRESH_INTERVAL_MS / 60000);
            const seconds = Math.floor((REFRESH_INTERVAL_MS % 60000) / 1000);

            let timeText = '';
            if (minutes > 0) {
                timeText = `${minutes} นาที`;
                if (seconds > 0) timeText += ` ${seconds} วินาที`;
            } else {
                timeText = `${seconds} วินาที`;
            }

            // Show notification
            Swal.fire({
                icon: 'success',
                title: 'ตั้งค่าระยะเวลาเรียบร้อย',
                text: `อัตโนมัติ: ทุก${timeText}`,
                timer: 1500,
                showConfirmButton: false
            });

            // Restart auto-refresh if it's already running
            if (IS_AUTO_REFRESH) {
                IS_AUTO_REFRESH = false;
                toggleAutoRefresh();
            }

            // Hide selector
            document.getElementById('refreshSelector').classList.add('hide');
        }

        // Show speed selector
        function showSpeedSelector() {
            const selector = document.getElementById('speedSelector');
            selector.classList.toggle('hide');
        }

        // Update speed multiplier
        function updateSpeed(value) {
            const speedLevel = parseInt(value);
            document.getElementById('speedValue').textContent = speedLevel;

            // Calculate multiplier: 1 = 0.5x, 5 = 1.0x, 10 = 2.0x
            SPEED_MULTIPLIER = 0.5 + (speedLevel / 10) * 1.5;

            // Log for debugging
            console.log(`🚀 Speed updated: Level ${speedLevel}, Multiplier: ${SPEED_MULTIPLIER.toFixed(2)}x`);
        }

        // Refresh data
        async function refreshData() {
            const btn = event.target;
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '⏳ กำลังโหลด...';

            const isApiConfigured = SCORDS_API_URL !== 'YOUR_DEPLOYED_WEB_APP_URL_HERE';

            if (isApiConfigured && CURRENT_ACTIVITY_ID) {
                await loadParticipants();
            } else {
                await loadMockData();
            }

            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = originalText;
            }, 1000);
        }

        // Toggle auto refresh
        function toggleAutoRefresh() {
            IS_AUTO_REFRESH = !IS_AUTO_REFRESH;
            document.getElementById('autoRefreshStatus').textContent = IS_AUTO_REFRESH ? 'ON' : 'OFF';

            if (IS_AUTO_REFRESH) {
                const minutes = Math.floor(REFRESH_INTERVAL_MS / 60000);
                const seconds = Math.floor((REFRESH_INTERVAL_MS % 60000) / 1000);

                let timeText = '';
                if (minutes > 0) {
                    timeText = `${minutes} นาที`;
                    if (seconds > 0) timeText += ` ${seconds} วินาที`;
                } else {
                    timeText = `${seconds} วินาที`;
                }

                Swal.fire({
                    icon: 'success',
                    title: 'เปิดรีเฟรชอัตโนมัติ',
                    text: `ข้อมูลจะอัปเดตทุก${timeText}`,
                    timer: 2000,
                    showConfirmButton: false
                });
            }
        }

        // Export data
        function exportData() {
            const csv = [
                ['ชื่อ', 'รหัสพนักงาน', 'ตำแหน่ง', 'แผนก', 'เวลาเช็คอิน', 'สถานะ'],
                ...PARTICIPANTS.map(p => [
                    p.displayName,
                    p.employeeId || '-',
                    p.position || '-',
                    p.department || '-',
                    formatCheckInTime(p.checkInTime),
                    p.status || '-'
                ])
            ].map(row => row.join(',')).join('\n');

            // Add BOM for Excel Thai language support
            const BOM = '\uFEFF';
            const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `participants_${CURRENT_ACTIVITY_ID || 'demo'}_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        // Show error
        function showError(title, message) {
            Swal.fire({
                icon: 'error',
                title: title,
                text: message,
                confirmButtonColor: '#667eea',
                confirmButtonText: 'ตกลง'
            });
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                refreshData();
            } else if (e.key === 'a' || e.key === 'A') {
                toggleAutoRefresh();
            } else if (e.key === 'b' || e.key === 'B') {
                showActivitySelector();
            }
        });
    </script>
</body>
</html>
