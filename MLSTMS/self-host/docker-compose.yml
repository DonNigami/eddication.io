version: '3.8'

services:
  # ============================================
  # Python Version
  # ============================================
  ptg-python:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ptg-ezview-python
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PTG_SQLITE_PATH=/app/data/ptg_data.db
      - PTG_CSV_PATH=/app/data/csv_output
      - PTG_LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - ptg-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/ptg_data.db').execute('SELECT 1')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    profiles:
      - python

  # ============================================
  # Node.js Version
  # ============================================
  ptg-nodejs:
    build:
      context: .
      dockerfile: Dockerfile.nodejs
    container_name: ptg-ezview-nodejs
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PTG_JSON_PATH=/app/data/json_output
      - PTG_LOG_LEVEL=INFO
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - ptg-network
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    profiles:
      - nodejs

  # ============================================
  # PostgreSQL Database (Optional)
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: ptg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ptg_ezview
      POSTGRES_USER: ptg_user
      POSTGRES_PASSWORD: ptg_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - ptg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptg_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

  # ============================================
  # pgAdmin (Optional - for database management)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ptg-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ptg.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    networks:
      - ptg-network
    depends_on:
      - postgres
    profiles:
      - postgres

  # ============================================
  # Grafana (Optional - for monitoring)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: ptg-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - ptg-network
    profiles:
      - monitoring

  # ============================================
  # Prometheus (Optional - for metrics)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ptg-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - ptg-network
    profiles:
      - monitoring

networks:
  ptg-network:
    driver: bridge

volumes:
  postgres-data:
  grafana-data:
  prometheus-data:
